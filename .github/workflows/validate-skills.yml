name: Validate Skills

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skills list
        run: bash .github/scripts/validate-skills.sh

      - name: Validate Codex compatibility contract
        run: ./scripts/validate-codex.sh

      - name: Verify generated Codex wrapper files
        run: |
          ./scripts/codex-packaging.sh sync-repo
          git diff --exit-code
