name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Check
        run: vp check  # Runs lint, format, typecheck in one step

      - name: Test
        run: vp test --run --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Build
        run: vp build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
